<svg width="1280" height="636" viewBox="0 0 1280 636" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="636" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#131a26"/>
      <stop offset="1" stop-color="#1b1430"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="636" rx="16" fill="url(#bg)"/>

  <!-- subtle grid dots -->
  <g fill="#ffffff" opacity="0.035">
    <circle cx="60" cy="40" r="2"/><circle cx="120" cy="40" r="2"/>
    <circle cx="1220" cy="596" r="2"/><circle cx="1160" cy="596" r="2"/>
  </g>

  <!-- ===== header ===== -->
  <text x="40" y="62" font-size="34" font-weight="700" fill="#f0f6fc" letter-spacing="-0.5">privatize-fork · 核心特性</text>
  <text x="42" y="94" font-size="17" font-weight="500" fill="#8b95a5">把开源 fork 一次性私有化：安全隔离 · 可维护可追溯 · 跨 Claude Code / Codex · 一套有顺序的方法论</text>

  <!-- ============ 4 category columns ============ -->
  <!-- card geometry: width 282, height 396, y=150; x = 40 / 346 / 652 / 958 -->

  <!-- ===== Col 1 · 安全·隔离 (blue) ===== -->
  <g transform="translate(40,128)">
    <rect width="282" height="336" rx="14" fill="#10161f" stroke="#22303f" stroke-width="1.5"/>
    <rect width="282" height="336" rx="14" fill="none" stroke="#58a6ff" stroke-opacity="0.18" stroke-width="1.5"/>
    <!-- category header -->
    <circle cx="32" cy="44" r="17" fill="#13243a"/>
    <g transform="translate(32,44)">
      <rect x="-8" y="-1" width="16" height="12" rx="2.2" fill="#58a6ff"/>
      <path d="M-5 -1 v-4 a5 5 0 0 1 10 0 v4" stroke="#58a6ff" stroke-width="2.2" fill="none"/>
    </g>
    <text x="60" y="50" font-size="20" font-weight="700" fill="#58a6ff">安全 · 隔离</text>
    <line x1="20" y1="74" x2="262" y2="74" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1.3"/>
    <!-- features -->
    <g font-weight="600">
      <circle cx="26" cy="108" r="3.5" fill="#58a6ff"/>
      <text x="42" y="114" font-size="17" fill="#e8eef6">upstream 只读 + 禁推</text>
      <text x="42" y="138" font-size="13.5" fill="#7d8898">git 层 push=DISABLED，杜绝误推</text>

      <circle cx="26" cy="190" r="3.5" fill="#58a6ff"/>
      <text x="42" y="196" font-size="17" fill="#e8eef6">private/ 彻底隔离</text>
      <text x="42" y="220" font-size="13.5" fill="#7d8898">定制不混上游目录，升级不冲突</text>

      <circle cx="26" cy="272" r="3.5" fill="#58a6ff"/>
      <text x="42" y="278" font-size="17" fill="#e8eef6">skip-worktree</text>
      <text x="42" y="302" font-size="13.5" fill="#7d8898">本地状态文件忽略本机变化</text>
    </g>
  </g>

  <!-- ===== Col 2 · 可维护·可追溯 (purple) ===== -->
  <g transform="translate(346,128)">
    <rect width="282" height="336" rx="14" fill="#13101d" stroke="#332746" stroke-width="1.5"/>
    <rect width="282" height="336" rx="14" fill="none" stroke="#bc6bff" stroke-opacity="0.18" stroke-width="1.5"/>
    <circle cx="32" cy="44" r="17" fill="#241733"/>
    <g transform="translate(32,44)" stroke="#bc6bff" stroke-width="2.1" stroke-linecap="round">
      <rect x="-8" y="-9" width="16" height="18" rx="2.4" fill="none"/>
      <line x1="-4" y1="-4" x2="4" y2="-4"/><line x1="-4" y1="0" x2="4" y2="0"/><line x1="-4" y1="4" x2="1" y2="4"/>
    </g>
    <text x="60" y="50" font-size="20" font-weight="700" fill="#bc6bff">可维护 · 追溯</text>
    <line x1="20" y1="74" x2="262" y2="74" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1.3"/>
    <g font-weight="600">
      <circle cx="26" cy="108" r="3.5" fill="#bc6bff"/>
      <text x="42" y="114" font-size="17" fill="#f0e9f8">维护规范自动生成</text>
      <text x="42" y="138" font-size="13.5" fill="#8b8198">升级流程 · tag 约定 · 验证命令</text>

      <circle cx="26" cy="190" r="3.5" fill="#bc6bff"/>
      <text x="42" y="196" font-size="17" fill="#f0e9f8">改动台账登记</text>
      <text x="42" y="220" font-size="13.5" fill="#8b8198">每处定制记「为什么改」，可审计</text>

      <circle cx="26" cy="272" r="3.5" fill="#bc6bff"/>
      <text x="42" y="278" font-size="17" fill="#f0e9f8">幂等可重入</text>
      <text x="42" y="302" font-size="13.5" fill="#8b8198">重跑只补缺失，绝不覆盖已有</text>
    </g>
  </g>

  <!-- ===== Col 3 · 跨 CC / Codex (green) ===== -->
  <g transform="translate(652,128)">
    <rect width="282" height="336" rx="14" fill="#0f1714" stroke="#22392e" stroke-width="1.5"/>
    <rect width="282" height="336" rx="14" fill="none" stroke="#7ee787" stroke-opacity="0.18" stroke-width="1.5"/>
    <circle cx="32" cy="44" r="17" fill="#13261b"/>
    <g transform="translate(32,44)" stroke="#7ee787" stroke-width="2.2" fill="none" stroke-linecap="round">
      <circle cx="-7" cy="0" r="4"/><circle cx="7" cy="0" r="4"/><line x1="-3" y1="0" x2="3" y2="0"/>
    </g>
    <text x="60" y="50" font-size="20" font-weight="700" fill="#7ee787">跨 CC / Codex</text>
    <line x1="20" y1="74" x2="262" y2="74" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1.3"/>
    <g font-weight="600">
      <circle cx="26" cy="108" r="3.5" fill="#7ee787"/>
      <text x="42" y="114" font-size="17" fill="#e6f5ea">一键装两边</text>
      <text x="42" y="138" font-size="13.5" fill="#7f9588">一个 install.sh 软链两个目录</text>

      <circle cx="26" cy="190" r="3.5" fill="#7ee787"/>
      <text x="42" y="196" font-size="17" fill="#e6f5ea">指针段跨平台</text>
      <text x="42" y="220" font-size="13.5" fill="#7f9588">写 CLAUDE.md / AGENTS.md</text>

      <circle cx="26" cy="272" r="3.5" fill="#7ee787"/>
      <text x="42" y="278" font-size="17" fill="#e6f5ea">文档翻译 · 增量</text>
      <text x="42" y="302" font-size="13.5" fill="#7f9588">内联翻译，只重译变动过的</text>
    </g>
  </g>

  <!-- ===== Col 4 · 方法论内核 (amber) ===== -->
  <g transform="translate(958,128)">
    <rect width="282" height="336" rx="14" fill="#181307" stroke="#3d3115" stroke-width="1.5"/>
    <rect width="282" height="336" rx="14" fill="none" stroke="#e3b341" stroke-opacity="0.18" stroke-width="1.5"/>
    <circle cx="32" cy="44" r="17" fill="#2a2110"/>
    <g transform="translate(32,44)" stroke="#e3b341" stroke-width="2" fill="none" stroke-linecap="round">
      <circle cx="0" cy="0" r="9"/><circle cx="0" cy="0" r="1.6" fill="#e3b341" stroke="none"/>
      <line x1="0" y1="-9" x2="0" y2="-12.5"/><line x1="0" y1="9" x2="0" y2="12.5"/>
      <line x1="-9" y1="0" x2="-12.5" y2="0"/><line x1="9" y1="0" x2="12.5" y2="0"/>
    </g>
    <text x="60" y="50" font-size="20" font-weight="700" fill="#e3b341">方法论内核</text>
    <line x1="20" y1="74" x2="262" y2="74" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1.3"/>
    <g font-weight="600">
      <circle cx="26" cy="108" r="3.5" fill="#e3b341"/>
      <text x="42" y="114" font-size="17" fill="#f5ecd6">先只读勘察暗礁</text>
      <text x="42" y="138" font-size="13.5" fill="#988b6f">.gitignore · 版本号 · 状态文件</text>

      <circle cx="26" cy="190" r="3.5" fill="#e3b341"/>
      <text x="42" y="196" font-size="17" fill="#f5ecd6">私有隔离 → 本地定型</text>
      <text x="42" y="220" font-size="13.5" fill="#988b6f">设计干净隔离，本地先定型</text>

      <circle cx="26" cy="272" r="3.5" fill="#e3b341"/>
      <text x="42" y="278" font-size="17" fill="#f5ecd6">发布交给你</text>
      <text x="42" y="302" font-size="13.5" fill="#988b6f">不自动 push/tag，确认再发</text>
    </g>
  </g>

  <!-- ===== flow panel (cards bottom = 464) ===== -->
  <rect x="40" y="492" width="1200" height="120" rx="14" fill="#0e141d" stroke="#243140" stroke-width="1.5"/>
  <!-- label -->
  <circle cx="66" cy="525" r="4" fill="#58a6ff"/>
  <text x="80" y="531" font-size="16" font-weight="700" fill="#c9d3e0">脚手架流程</text>
  <text x="172" y="531" font-size="14.5" font-weight="500" fill="#6b7686">固定顺序，一次走完（重跑只补缺失）</text>

  <!-- 8 stage pills in equal 150px slots; arrows at slot boundaries -->
  <g font-size="15.5" font-weight="600" text-anchor="middle">
    <!-- arrows at x = 190/340/490/640/790/940/1090, y≈580 -->
    <g fill="#46505f" font-size="17">
      <text x="190" y="585">→</text><text x="340" y="585">→</text><text x="490" y="585">→</text>
      <text x="640" y="585">→</text><text x="790" y="585">→</text><text x="940" y="585">→</text><text x="1090" y="585">→</text>
    </g>

    <!-- 1 勘察 (amber) cx=115 -->
    <rect x="86" y="562" width="58" height="36" rx="18" fill="#181307" stroke="#e3b341" stroke-opacity="0.5" stroke-width="1.4"/>
    <text x="115" y="585" fill="#e3b341">勘察</text>
    <!-- 2 引导问答 (gray) cx=265 -->
    <rect x="217" y="562" width="96" height="36" rx="18" fill="#161b22" stroke="#3a4452" stroke-width="1.4"/>
    <text x="265" y="585" fill="#c9d3e0">引导问答</text>
    <!-- 3 配远端 (blue) cx=415 -->
    <rect x="376" y="562" width="78" height="36" rx="18" fill="#10161f" stroke="#58a6ff" stroke-opacity="0.5" stroke-width="1.4"/>
    <text x="415" y="585" fill="#58a6ff">配远端</text>
    <!-- 4 private/ (purple) cx=565 -->
    <rect x="523" y="562" width="84" height="36" rx="18" fill="#13101d" stroke="#bc6bff" stroke-opacity="0.5" stroke-width="1.4"/>
    <text x="565" y="585" fill="#bc6bff">private/</text>
    <!-- 5 翻译 (green) cx=715 -->
    <rect x="686" y="562" width="58" height="36" rx="18" fill="#0f1714" stroke="#7ee787" stroke-opacity="0.5" stroke-width="1.4"/>
    <text x="715" y="585" fill="#7ee787">翻译</text>
    <!-- 6 指针段 (green) cx=865 -->
    <rect x="825" y="562" width="80" height="36" rx="18" fill="#0f1714" stroke="#7ee787" stroke-opacity="0.5" stroke-width="1.4"/>
    <text x="865" y="585" fill="#7ee787">指针段</text>
    <!-- 7 skip-worktree (gray) cx=1015 -->
    <rect x="956" y="562" width="118" height="36" rx="18" fill="#161b22" stroke="#3a4452" stroke-width="1.4"/>
    <text x="1015" y="585" fill="#c9d3e0">skip-worktree</text>
    <!-- 8 本地就绪 (amber) cx=1165 -->
    <rect x="1117" y="562" width="96" height="36" rx="18" fill="#181307" stroke="#e3b341" stroke-opacity="0.6" stroke-width="1.4"/>
    <text x="1165" y="585" fill="#e3b341">本地就绪</text>
  </g>
</svg>

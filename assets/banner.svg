<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#131a26"/>
      <stop offset="1" stop-color="#1b1430"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#bc6bff"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="400" rx="16" fill="url(#bg)"/>

  <!-- subtle grid dots -->
  <g fill="#ffffff" opacity="0.04">
    <circle cx="60" cy="46" r="2"/><circle cx="120" cy="46" r="2"/><circle cx="180" cy="46" r="2"/>
    <circle cx="1160" cy="354" r="2"/><circle cx="1220" cy="354" r="2"/><circle cx="1100" cy="354" r="2"/>
  </g>

  <!-- faint vertical divider -->
  <line x1="392" y1="64" x2="392" y2="336" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- ===== git graph: fork splits into upstream (locked) and private (key) ===== -->
  <g transform="translate(96,200)">
    <line x1="0" y1="0" x2="92" y2="0" stroke="#3d4654" stroke-width="6" stroke-linecap="round"/>
    <path d="M92 0 C 150 0 168 -74 226 -74" stroke="#3d4654" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M92 0 C 150 0 168 74 226 74" stroke="url(#accent)" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow)"/>

    <circle cx="0" cy="0" r="11" fill="#0d1117" stroke="#58a6ff" stroke-width="4"/>
    <circle cx="92" cy="0" r="9" fill="#0d1117" stroke="#3d4654" stroke-width="4"/>

    <!-- upstream node: locked (read-only) -->
    <circle cx="240" cy="-74" r="22" fill="#161b22" stroke="#3d4654" stroke-width="3"/>
    <g transform="translate(240,-74)">
      <rect x="-8" y="-2" width="16" height="13" rx="2.5" fill="#8b949e"/>
      <path d="M-5 -2 v-4 a5 5 0 0 1 10 0 v4" stroke="#8b949e" stroke-width="2.4" fill="none"/>
    </g>

    <!-- private node: key (glow) -->
    <circle cx="240" cy="74" r="22" fill="#1b1430" stroke="url(#accent)" stroke-width="3" filter="url(#glow)"/>
    <g transform="translate(240,74)" stroke="#d2b3ff" stroke-width="2.6" fill="none" stroke-linecap="round">
      <circle cx="-4" cy="-4" r="5"/>
      <path d="M0 0 L9 9 M6 6 l3 -3 M9 9 l-3 3"/>
    </g>
  </g>

  <!-- ===== title ===== -->
  <text x="448" y="118" font-size="54" font-weight="700" fill="#f0f6fc" letter-spacing="-1">privatize-fork</text>
  <text x="450" y="160" font-size="22" font-weight="500" fill="#9aa7b8">开源 fork 一次性私有化脚手架 · Claude Code skill</text>

  <!-- ===== feature grid: 2 rows x 3 cols, covers every stage ===== -->
  <g font-size="17" font-weight="600">

    <!-- row 1 -->
    <!-- 1. upstream read-only + no-push -->
    <g transform="translate(448,196)">
      <rect width="248" height="48" rx="12" fill="#161b22" stroke="#2b3340" stroke-width="1.5"/>
      <g transform="translate(24,24)">
        <rect x="-8" y="-1" width="16" height="12" rx="2.2" fill="#58a6ff"/>
        <path d="M-5 -1 v-4 a5 5 0 0 1 10 0 v4" stroke="#58a6ff" stroke-width="2.2" fill="none"/>
      </g>
      <text x="46" y="30" fill="#c9d3e0">upstream 只读·禁推</text>
    </g>
    <!-- 2. private isolation -->
    <g transform="translate(714,196)">
      <rect width="248" height="48" rx="12" fill="#1b1430" stroke="#3a2d5c" stroke-width="1.5"/>
      <g transform="translate(24,24)" fill="none" stroke="#bc6bff" stroke-width="2.2" stroke-linejoin="round">
        <path d="M-9 -6 h6 l2 3 h10 v9 a1 1 0 0 1 -1 1 h-16 a1 1 0 0 1 -1 -1 z"/>
      </g>
      <text x="46" y="30" fill="#d8c6ff">private/ 私有隔离</text>
    </g>
    <!-- 3. change registry -->
    <g transform="translate(980,196)">
      <rect width="248" height="48" rx="12" fill="#1b1430" stroke="#3a2d5c" stroke-width="1.5"/>
      <g transform="translate(24,24)" stroke="#bc6bff" stroke-width="2.2" stroke-linecap="round">
        <circle cx="-8" cy="-6" r="1.4" fill="#bc6bff" stroke="none"/><line x1="-4" y1="-6" x2="9" y2="-6"/>
        <circle cx="-8" cy="0" r="1.4" fill="#bc6bff" stroke="none"/><line x1="-4" y1="0" x2="9" y2="0"/>
        <circle cx="-8" cy="6" r="1.4" fill="#bc6bff" stroke="none"/><line x1="-4" y1="6" x2="9" y2="6"/>
      </g>
      <text x="46" y="30" fill="#d8c6ff">改动台账登记</text>
    </g>

    <!-- row 2 -->
    <!-- 4. private slash commands -->
    <g transform="translate(448,256)">
      <rect width="248" height="48" rx="12" fill="#161b22" stroke="#2b3340" stroke-width="1.5"/>
      <g transform="translate(24,24)" fill="none" stroke="#58a6ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M-9 -6 l5 6 l-5 6"/><line x1="-1" y1="6" x2="9" y2="6"/>
      </g>
      <text x="46" y="30" fill="#c9d3e0">私有命令脚手架</text>
    </g>
    <!-- 5. optional translation module -->
    <g transform="translate(714,256)">
      <rect width="248" height="48" rx="12" fill="#161b22" stroke="#2b3340" stroke-width="1.5"/>
      <g transform="translate(24,24)" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round">
        <circle cx="0" cy="0" r="9"/>
        <ellipse cx="0" cy="0" rx="4" ry="9"/>
        <line x1="-9" y1="0" x2="9" y2="0"/>
      </g>
      <text x="46" y="30" fill="#c9d3e0">可选文档翻译</text>
    </g>
    <!-- 6. idempotent / re-entrant -->
    <g transform="translate(980,256)">
      <rect width="248" height="48" rx="12" fill="#161b22" stroke="#2b3340" stroke-width="1.5"/>
      <g transform="translate(24,24)" fill="none" stroke="#7ee787" stroke-width="2.2" stroke-linecap="round">
        <path d="M8 -3 a9 9 0 1 0 1 7"/>
        <path d="M8 -9 v6 h-6"/>
      </g>
      <text x="46" y="30" fill="#c9d3e0">幂等·可重入</text>
    </g>
  </g>

  <!-- footer note: covers reconnaissance + local-ready behavior -->
  <text x="450" y="332" font-size="15" font-weight="500" fill="#6b7686">先只读勘察暗礁 → 私有隔离 → 本地就绪，发布交给你确认</text>
</svg>

<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05" intercept="0"/></feComponentTransfer>
    </filter>
    <style>
      .mono { font-family: 'Menlo','SFMono-Regular',monospace; }
      .disp { font-family: 'Futura','Avenir Next',sans-serif; }
      .body { font-family: 'Avenir Next','Helvetica Neue',sans-serif; }
    </style>
  </defs>

  <!-- paper + grain -->
  <rect width="1280" height="400" fill="#f1ebdd"/>
  <rect width="1280" height="400" fill="#000000" filter="url(#grain)"/>

  <!-- drafting frame: double rule -->
  <rect x="20" y="20" width="1240" height="360" fill="none" stroke="#211e18" stroke-width="1.4"/>
  <rect x="25" y="25" width="1230" height="350" fill="none" stroke="#211e18" stroke-opacity="0.3" stroke-width="0.8"/>
  <!-- corner registration ticks -->
  <g stroke="#c43c30" stroke-width="1.6" fill="none">
    <path d="M20 36 V20 H36"/>
    <path d="M1244 20 H1260 V36"/>
    <path d="M20 364 V380 H36"/>
    <path d="M1244 380 H1260 V364"/>
  </g>

  <!-- top meta bar -->
  <text x="44" y="50" class="mono" font-size="13" letter-spacing="1.5" fill="#c43c30">上下文审计 · CONTEXT-DOCTOR</text>
  <text x="1236" y="50" class="mono" font-size="13" letter-spacing="1.5" fill="#6f685a" text-anchor="end">CLAUDE CODE / CODEX</text>
  <line x1="44" y1="62" x2="1236" y2="62" stroke="#211e18" stroke-opacity="0.25" stroke-width="0.8"/>

  <!-- vertical divider -->
  <line x1="392" y1="82" x2="392" y2="352" stroke="#211e18" stroke-opacity="0.22" stroke-width="0.8"/>

  <!-- ===== left: magnifier scanning an inventory stack (ink line-art), centered y=200 ===== -->
  <g transform="translate(96,200)">
    <text x="0" y="-82" class="mono" font-size="12" fill="#6f685a">~/.codex</text>
    <!-- stack of inventory cards -->
    <g stroke="#211e18" stroke-width="1.5" fill="#f7f0e2">
      <rect x="0" y="-66" width="150" height="26" rx="2"/>
      <rect x="0" y="-34" width="150" height="26" rx="2"/>
      <rect x="0" y="-2" width="150" height="26" rx="2"/>
      <rect x="0" y="30" width="150" height="26" rx="2"/>
    </g>
    <!-- list-row dots + rules -->
    <g fill="#6f685a">
      <circle cx="13" cy="-53" r="2.2"/><circle cx="13" cy="-21" r="2.2"/><circle cx="13" cy="11" r="2.2"/><circle cx="13" cy="43" r="2.2"/>
    </g>
    <g stroke="#211e18" stroke-opacity="0.28" stroke-width="0.9">
      <line x1="26" y1="-53" x2="120" y2="-53"/><line x1="26" y1="-21" x2="120" y2="-21"/><line x1="26" y1="11" x2="120" y2="11"/><line x1="26" y1="43" x2="120" y2="43"/>
    </g>
    <!-- magnifier scanning, red -->
    <circle cx="150" cy="-6" r="36" fill="#f1ebdd" fill-opacity="0.55" stroke="#c43c30" stroke-width="2"/>
    <line x1="176" y1="20" x2="206" y2="50" stroke="#c43c30" stroke-width="3" stroke-linecap="round"/>
    <!-- check inside lens -->
    <path d="M134 -6 l10 11 l20 -24" fill="none" stroke="#c43c30" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ===== right: title + audit-target cells ===== -->
  <text x="412" y="120" class="disp" font-size="44" font-weight="600" fill="#211e18" letter-spacing="-0.5">codex-context-doctor</text>
  <text x="414" y="152" class="body" font-size="16.5" fill="#5f584b">审计 Codex 上下文 · 插件 / App / MCP / 技能 / 市场源 · 本地只读不联网</text>

  <!-- 6 audit cells: 2 rows x 3 cols -->
  <g>
    <g transform="translate(412,180)">
      <rect width="268" height="58" fill="#ece4d3" stroke="#211e18" stroke-width="0.9"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">01</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="600" fill="#26221b">插件 Plugins</text>
    </g>
    <g transform="translate(692,180)">
      <rect width="268" height="58" fill="#ece4d3" stroke="#211e18" stroke-width="0.9"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">02</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="600" fill="#26221b">App · 连接器</text>
    </g>
    <g transform="translate(972,180)">
      <rect width="268" height="58" fill="#ece4d3" stroke="#211e18" stroke-width="0.9"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">03</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="600" fill="#26221b">MCP 服务器</text>
    </g>
    <g transform="translate(412,250)">
      <rect width="268" height="58" fill="#ece4d3" stroke="#211e18" stroke-width="0.9"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">04</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="600" fill="#26221b">技能 Skills</text>
    </g>
    <g transform="translate(692,250)">
      <rect width="268" height="58" fill="#ece4d3" stroke="#211e18" stroke-width="0.9"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">05</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="600" fill="#26221b">市场源</text>
    </g>
    <g transform="translate(972,250)">
      <rect width="268" height="58" fill="#e7ddc8" stroke="#c43c30" stroke-width="1.2"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">06</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="700" fill="#26221b">卫生建议</text>
    </g>
  </g>

  <!-- footer flow -->
  <text x="414" y="346" class="mono" font-size="13" fill="#6f685a">本地扫描 <tspan fill="#c43c30">→</tspan> 盘点清单 <tspan fill="#c43c30">→</tspan> 卫生建议 <tspan fill="#c43c30">→</tspan> report.md / inventory.json</text>
</svg>

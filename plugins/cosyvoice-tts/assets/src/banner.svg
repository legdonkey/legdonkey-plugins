<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05" intercept="0"/></feComponentTransfer>
    </filter>
    <style>
      .mono { font-family: 'Menlo','SFMono-Regular',monospace; }
      .disp { font-family: 'Futura','Avenir Next',sans-serif; }
      .body { font-family: 'Avenir Next','Helvetica Neue',sans-serif; }
    </style>
  </defs>

  <!-- paper + grain -->
  <rect width="1280" height="400" fill="#f1ebdd"/>
  <rect width="1280" height="400" fill="#000000" filter="url(#grain)"/>

  <!-- drafting frame: double rule -->
  <rect x="20" y="20" width="1240" height="360" fill="none" stroke="#211e18" stroke-width="1.4"/>
  <rect x="25" y="25" width="1230" height="350" fill="none" stroke="#211e18" stroke-opacity="0.3" stroke-width="0.8"/>
  <!-- corner registration ticks -->
  <g stroke="#c43c30" stroke-width="1.6" fill="none">
    <path d="M20 36 V20 H36"/>
    <path d="M1244 20 H1260 V36"/>
    <path d="M20 364 V380 H36"/>
    <path d="M1244 380 H1260 V364"/>
  </g>

  <!-- top meta bar -->
  <text x="44" y="50" class="mono" font-size="13" letter-spacing="1.5" fill="#c43c30">中文配音 · COSYVOICE-TTS</text>
  <text x="1236" y="50" class="mono" font-size="13" letter-spacing="1.5" fill="#6f685a" text-anchor="end">CLAUDE CODE / CODEX</text>
  <line x1="44" y1="62" x2="1236" y2="62" stroke="#211e18" stroke-opacity="0.25" stroke-width="0.8"/>

  <!-- vertical divider -->
  <line x1="392" y1="82" x2="392" y2="352" stroke="#211e18" stroke-opacity="0.22" stroke-width="0.8"/>

  <!-- ===== left: microphone + waveform line-art, centered y=200 ===== -->
  <g transform="translate(82,200)">
    <text x="0" y="-82" class="mono" font-size="12" fill="#6f685a">DashScope / CosyVoice</text>

    <!-- microphone -->
    <g stroke="#211e18" stroke-width="1.6" fill="#f7f0e2">
      <rect x="18" y="-62" width="54" height="94" rx="26"/>
      <path d="M0 -14 v18 c0 30 20 52 45 52s45 -22 45 -52v-18" fill="none"/>
      <path d="M45 56 v38"/>
      <path d="M18 94 h54"/>
    </g>
    <g stroke="#211e18" stroke-opacity="0.28" stroke-width="0.9">
      <line x1="30" y1="-36" x2="60" y2="-36"/>
      <line x1="30" y1="-14" x2="60" y2="-14"/>
      <line x1="30" y1="8" x2="60" y2="8"/>
    </g>

    <!-- waveform -->
    <g transform="translate(128,0)" stroke="#c43c30" stroke-width="2" stroke-linecap="round" fill="none">
      <path d="M0 0 C16 -44 30 44 46 0 S76 -44 92 0 S122 44 138 0 S168 -44 184 0"/>
      <path d="M12 56 C24 28 36 84 48 56 S72 28 84 56 S108 84 120 56" stroke-opacity="0.72" stroke-width="1.6"/>
    </g>

    <!-- output file card -->
    <g transform="translate(160,-78)">
      <rect width="118" height="46" rx="2" fill="#f1ebdd" stroke="#211e18" stroke-width="1.4"/>
      <text x="13" y="19" class="mono" font-size="11" fill="#c43c30">out.wav</text>
      <text x="13" y="35" class="mono" font-size="10.5" fill="#6f685a">24k mono</text>
    </g>
  </g>

  <!-- ===== right: title + tts cells ===== -->
  <text x="412" y="120" class="disp" font-size="48" font-weight="600" fill="#211e18" letter-spacing="-0.5">cosyvoice-tts</text>
  <text x="414" y="152" class="body" font-size="16.5" fill="#5f584b">阿里百炼 CosyVoice 中文配音 · Instruct 情感控制 · 试听后批量生成 wav</text>

  <!-- 6 tts cells: 2 rows x 3 cols -->
  <g>
    <g transform="translate(412,180)">
      <rect width="268" height="58" fill="#ece4d3" stroke="#211e18" stroke-width="0.9"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">01</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="600" fill="#26221b">Instruct 情感</text>
    </g>
    <g transform="translate(692,180)">
      <rect width="268" height="58" fill="#ece4d3" stroke="#211e18" stroke-width="0.9"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">02</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="600" fill="#26221b">音色清单</text>
    </g>
    <g transform="translate(972,180)">
      <rect width="268" height="58" fill="#ece4d3" stroke="#211e18" stroke-width="0.9"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">03</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="600" fill="#26221b">试听 Preview</text>
    </g>
    <g transform="translate(412,250)">
      <rect width="268" height="58" fill="#ece4d3" stroke="#211e18" stroke-width="0.9"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">04</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="600" fill="#26221b">批量生成 wav</text>
    </g>
    <g transform="translate(692,250)">
      <rect width="268" height="58" fill="#ece4d3" stroke="#211e18" stroke-width="0.9"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">05</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="600" fill="#26221b">语速 / 音调 / 音量</text>
    </g>
    <g transform="translate(972,250)">
      <rect width="268" height="58" fill="#e7ddc8" stroke="#c43c30" stroke-width="1.2"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">06</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="700" fill="#26221b">视频旁白对轴</text>
    </g>
  </g>

  <!-- footer flow -->
  <text x="414" y="346" class="mono" font-size="13" fill="#6f685a">选音色 <tspan fill="#c43c30">→</tspan> 试听情感 <tspan fill="#c43c30">→</tspan> 生成 wav <tspan fill="#c43c30">→</tspan> 记录时长给时间轴</text>
</svg>

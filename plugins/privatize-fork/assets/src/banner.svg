<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05" intercept="0"/></feComponentTransfer>
    </filter>
    <style>
      .mono { font-family: 'Menlo','SFMono-Regular',monospace; }
      .disp { font-family: 'Futura','Avenir Next',sans-serif; }
      .body { font-family: 'Avenir Next','Helvetica Neue',sans-serif; }
    </style>
  </defs>

  <!-- paper + grain -->
  <rect width="1280" height="400" fill="#f1ebdd"/>
  <rect width="1280" height="400" fill="#000000" filter="url(#grain)"/>

  <!-- drafting frame: double rule -->
  <rect x="20" y="20" width="1240" height="360" fill="none" stroke="#211e18" stroke-width="1.4"/>
  <rect x="25" y="25" width="1230" height="350" fill="none" stroke="#211e18" stroke-opacity="0.3" stroke-width="0.8"/>
  <!-- corner registration ticks -->
  <g stroke="#c43c30" stroke-width="1.6" fill="none">
    <path d="M20 36 V20 H36"/>
    <path d="M1244 20 H1260 V36"/>
    <path d="M20 364 V380 H36"/>
    <path d="M1244 380 H1260 V364"/>
  </g>

  <!-- top meta bar -->
  <text x="44" y="50" class="mono" font-size="13" letter-spacing="1.5" fill="#c43c30">维护规范 · MAINTENANCE-SPEC</text>
  <text x="1236" y="50" class="mono" font-size="13" letter-spacing="1.5" fill="#6f685a" text-anchor="end">CLAUDE CODE / CODEX</text>
  <line x1="44" y1="62" x2="1236" y2="62" stroke="#211e18" stroke-opacity="0.25" stroke-width="0.8"/>

  <!-- vertical divider -->
  <line x1="392" y1="82" x2="392" y2="352" stroke="#211e18" stroke-opacity="0.22" stroke-width="0.8"/>

  <!-- ===== left: technical fork diagram (ink line-art), centered y=200 ===== -->
  <g transform="translate(70,200)">
    <circle cx="0" cy="0" r="8" fill="#f1ebdd" stroke="#211e18" stroke-width="1.6"/>
    <line x1="0" y1="0" x2="76" y2="0" stroke="#211e18" stroke-width="1.6"/>
    <path d="M76 0 C 130 0 138 -56 190 -56" fill="none" stroke="#211e18" stroke-width="1.6"/>
    <path d="M76 0 C 130 0 138 56 190 56" fill="none" stroke="#c43c30" stroke-width="1.8"/>

    <!-- upstream node: locked -->
    <rect x="176" y="-70" width="28" height="28" fill="#f1ebdd" stroke="#211e18" stroke-width="1.5"/>
    <g transform="translate(190,-56)">
      <rect x="-6" y="-1" width="12" height="9" rx="1.6" fill="#211e18"/>
      <path d="M-4 -1 v-3 a4 4 0 0 1 8 0 v3" fill="none" stroke="#211e18" stroke-width="1.5"/>
    </g>
    <text x="214" y="-59" class="mono" font-size="12" fill="#6f685a">upstream</text>
    <text x="214" y="-44" class="mono" font-size="12" fill="#6f685a">只读 · 禁推</text>

    <!-- private node: key -->
    <rect x="176" y="42" width="28" height="28" fill="#f7f0e2" stroke="#c43c30" stroke-width="1.6"/>
    <g transform="translate(190,56)" fill="none" stroke="#c43c30" stroke-width="1.7" stroke-linecap="round">
      <circle cx="-3" cy="-3" r="3.6"/>
      <path d="M-0.5 -0.5 L6 6 M4 4 l2 -2 M6 6 l-2 2"/>
    </g>
    <text x="214" y="53" class="mono" font-size="12" fill="#c43c30">private/</text>
    <text x="214" y="68" class="mono" font-size="12" fill="#6f685a">私有隔离</text>
  </g>

  <!-- ===== right: title + spec cells ===== -->
  <text x="412" y="120" class="disp" font-size="50" font-weight="600" fill="#211e18" letter-spacing="-0.5">privatize-fork</text>
  <text x="414" y="152" class="body" font-size="16.5" fill="#5f584b">开源 fork 私有化 · 立一套可长期维护的规范 · Claude Code + Codex</text>

  <!-- 6 spec cells: 2 rows x 3 cols -->
  <g>
    <g transform="translate(412,180)">
      <rect width="268" height="58" fill="#ece4d3" stroke="#211e18" stroke-width="0.9"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">01</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="600" fill="#26221b">upstream 只读 · 禁推</text>
    </g>
    <g transform="translate(692,180)">
      <rect width="268" height="58" fill="#ece4d3" stroke="#211e18" stroke-width="0.9"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">02</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="600" fill="#26221b">private/ 私有隔离</text>
    </g>
    <g transform="translate(972,180)">
      <rect width="268" height="58" fill="#ece4d3" stroke="#211e18" stroke-width="0.9"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">03</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="600" fill="#26221b">改动台账登记</text>
    </g>
    <g transform="translate(412,250)">
      <rect width="268" height="58" fill="#ece4d3" stroke="#211e18" stroke-width="0.9"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">04</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="600" fill="#26221b">跨 CC / Codex</text>
    </g>
    <g transform="translate(692,250)">
      <rect width="268" height="58" fill="#ece4d3" stroke="#211e18" stroke-width="0.9"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">05</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="600" fill="#26221b">可选文档翻译</text>
    </g>
    <g transform="translate(972,250)">
      <rect width="268" height="58" fill="#e7ddc8" stroke="#c43c30" stroke-width="1.2"/>
      <text x="14" y="24" class="mono" font-size="12.5" letter-spacing="1" fill="#c43c30">06</text>
      <text x="14" y="45" class="body" font-size="16" font-weight="700" fill="#26221b">维护规范</text>
    </g>
  </g>

  <!-- footer flow -->
  <text x="414" y="346" class="mono" font-size="13" fill="#6f685a">勘察 <tspan fill="#c43c30">→</tspan> 私有隔离 <tspan fill="#c43c30">→</tspan> 本地就绪 <tspan fill="#c43c30">→</tspan> 发布交给你确认</text>
</svg>
